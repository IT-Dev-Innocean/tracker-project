[build]
  base = "frontend-app"
  command = "npm run build"
  publish = "dist"
  # Skip build Netlify jika commit hanya mengubah backend (monorepo)
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- frontend-app/ netlify.toml"

# SPA fallback — semua route diarahkan ke index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
